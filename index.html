<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="공간나라 홈페이지 준비중">
	<title>공간나라 — 홈페이지 준비중</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
	<style>
		* { box-sizing: border-box; }
		html, body { height: 100%; margin: 0; }
		body {
			font-family: "Noto Sans KR", "Malgun Gothic", "맑은 고딕", sans-serif;
			background: #f4f6fa;
			background-image:
				linear-gradient(180deg, #ffffff 0%, #eef1f7 100%),
				repeating-linear-gradient(90deg, rgba(29, 32, 135, 0.04) 0 1px, transparent 1px 40px),
				repeating-linear-gradient(0deg, rgba(29, 32, 135, 0.04) 0 1px, transparent 1px 40px);
			background-blend-mode: normal, multiply, multiply;
			color: #1a1d26;
			overflow-x: hidden;
		}
		.wrap {
			min-height: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 2rem 1.25rem 3rem;
			text-align: center;
		}
		.badge {
			display: inline-block;
			margin-bottom: 1.5rem;
			padding: 0.35rem 0.85rem;
			font-size: 0.75rem;
			font-weight: 700;
			letter-spacing: 0.08em;
			color: #1d2087;
			border: 1px solid rgba(29, 32, 135, 0.2);
			border-radius: 4px;
			background: #fff;
			box-shadow: 0 1px 2px rgba(29, 32, 135, 0.06);
		}
		.logo {
			display: block;
			width: min(92vw, 420px);
			height: auto;
			margin: 0 auto 1.75rem;
		}
		h1 {
			margin: 0 0 0.5rem;
			font-size: clamp(1.5rem, 4.5vw, 2.25rem);
			font-weight: 900;
			line-height: 1.35;
			color: #12141a;
		}
		h1 .accent { color: #1d2087; }
		.lead {
			margin: 0 0 1rem;
			max-width: 28em;
			font-size: 1rem;
			line-height: 1.7;
			color: #5c6370;
		}
		.phone {
			margin: 0 0 2rem;
			font-size: 1.25rem;
			font-weight: 700;
			letter-spacing: 0.02em;
			color: #1d2087;
		}
		.dots {
			display: inline-block;
			animation: blink 1.4s steps(3, end) infinite;
		}
		@keyframes blink {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.35; }
		}
		footer {
			margin-top: 3rem;
			font-size: 0.8rem;
			color: #8b929e;
		}
	</style>
</head>
<body>

<main class="wrap">
	<span class="badge">준비중</span>
	<img src="logo.svg" width="400" height="100" class="logo" alt="공간나라">
	<h1>홈페이지를 <span class="accent">준비중</span>입니다<span class="dots">...</span></h1>
	<p class="lead">
		더 나은 서비스로 찾아뵙기 위해 공간을 다듬고 있습니다.<br>
		곧 새 주소로 인사드리겠습니다.
	</p>
	<p class="phone">1688-1458</p>
	<footer>개성종합네트웍스 임직원 배상</footer>
</main>

</body>
</html>
